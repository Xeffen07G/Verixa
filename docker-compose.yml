version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/temp:/app/temp
    environment:
      - MONGO_URI=mongodb://mongodb:27017/verixa
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - mongodb
      - redis
    networks:
      - verixa-net

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    networks:
      - verixa-net

  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    networks:
      - verixa-net

  redis:
    image: redis:alpine
    networks:
      - verixa-net

networks:
  verixa-net:
    driver: bridge

volumes:
  mongodb_data:
